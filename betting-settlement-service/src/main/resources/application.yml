server:
  port: 8082

spring:
  application:
    name: betting-settlement-service

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  consumer:
    group: bet-settlement-consumer-group
  topic:
    bet-settlements: bet-settlements

logging:
  level:
    com.sportybet.settlement.service: INFO
    org.apache.rocketmq: INFO
